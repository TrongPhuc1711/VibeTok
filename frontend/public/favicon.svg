<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#0a0a0a"/>

  <!-- Glow filters -->
  <defs>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cyan shadow (offset layer) -->
  <path
    d="M320 260 
       Q360 220 420 300 
       L512 700 
       Q520 740 550 700 
       L700 300 
       Q740 220 780 260"
    stroke="#00f5ff"
    stroke-width="110"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    transform="translate(12, 16)"
    filter="url(#glowCyan)"
    opacity="0.9"
  />

  <!-- Main pink V -->
  <path
    d="M320 260 
       Q360 220 420 300 
       L512 700 
       Q520 740 550 700 
       L700 300 
       Q740 220 780 260"
    stroke="#ff2d78"
    stroke-width="110"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glowPink)"
  />
</svg>