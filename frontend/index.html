<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA Meta Tags ── -->
    <meta name="theme-color" content="#ff2d78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VibeTok" />
    <meta name="application-name" content="VibeTok" />
    <meta name="msapplication-TileColor" content="#ff2d78" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- ── SEO Meta ── -->
    <meta name="description" content="Nền tảng chia sẻ video ngắn dành cho thế hệ sáng tạo Việt Nam — Feel The Vibe" />
    <meta name="keywords" content="vibetok, video ngắn, tiktok việt nam, sáng tạo nội dung" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VibeTok — Feel The Vibe" />
    <meta property="og:description" content="Nền tảng chia sẻ video ngắn dành cho thế hệ sáng tạo Việt Nam" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- ── Favicon & Icons ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Apple Splash Screens (tùy chọn - thêm sau) -->
    <!-- <link rel="apple-touch-startup-image" href="/splash/splash-2048x2732.png" media="..."> -->

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <title>VibeTok — Feel The Vibe</title>

    <!-- ── Register Service Worker ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then((registration) => {
              console.log('[PWA] Service Worker đã đăng ký:', registration.scope);

              // Kiểm tra update
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Có phiên bản mới — thông báo user
                    if (window.__vibetok_onUpdate) {
                      window.__vibetok_onUpdate();
                    }
                  }
                });
              });
            })
            .catch((err) => console.warn('[PWA] SW đăng ký thất bại:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
